name: Terraform

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply changes after plan? (default: plan only)"
        required: false
        type: boolean
        default: false

env:
  GCP_REGION: europe-west1
  GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
  GCP_TERRAFORM_SA_EMAIL: ${{ secrets.GCP_TERRAFORM_SA_EMAIL }}
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_BACKEND_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}

defaults:
  run:
    working-directory: terraform

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_TERRAFORM_SA_EMAIL }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init
        run: terraform init -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}"

      - name: Validate
        run: terraform validate

      - name: Plan
        run: terraform plan -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: inputs.apply
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_TERRAFORM_SA_EMAIL }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init
        run: terraform init -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}"

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Apply
        run: terraform apply tfplan
