name: Build and Deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: europe-west1
  GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}     # terraform output wif_provider
  GCP_SA_EMAIL: ${{ secrets.GCP_SA_EMAIL }}             # terraform output github_actions_sa_email
  GKE_CLUSTER: devops-test-cluster
  AR_REPO: devops-test
  GCP_APP_SA_EMAIL: ${{ secrets.GCP_APP_SA_EMAIL }}             # terraform output app_sa_email
  CLOUD_SQL_CONNECTION_NAME: ${{ secrets.CLOUD_SQL_CONNECTION_NAME }} # terraform output cloud_sql_connection_name

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Test
        run: mvn verify -B

  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        # PRs from forks cannot access secrets; skip push for those
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: tag
        run: |
          BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/devops-test"
          SHA="sha-$(git rev-parse --short HEAD)"
          echo "image=${BASE}:${SHA}" >> "$GITHUB_OUTPUT"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.tag.outputs.image }}
            ${{ github.ref == 'refs/heads/main' && format('{0}:latest', steps.tag.outputs.base) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_REGION }}

      - name: Deploy
        run: |
          # Reconstruct the image URL here to avoid GitHub masking it when
          # passed as a job output (project ID is a secret)
          export IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/devops-test:sha-$(git rev-parse --short HEAD)"
          export GCP_APP_SA_IAM_USER="${GCP_APP_SA_EMAIL%.gserviceaccount.com}"

          kubectl apply -f kubernetes/namespace.yaml
          envsubst < kubernetes/serviceaccount.yaml | kubectl apply -f -
          kubectl apply -f kubernetes/service.yaml
          envsubst < kubernetes/deployment.yaml | kubectl apply -f -
