apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-test
  namespace: devops-test
  annotations:
    # Binds this K8s ServiceAccount to the GCP service account via Workload Identity.
    # The GCP SA has roles/cloudsql.client, allowing the Auth Proxy sidecar to
    # authenticate to Cloud SQL without any credentials stored in the cluster
    iam.gke.io/gcp-service-account: ${GCP_APP_SA_EMAIL}
