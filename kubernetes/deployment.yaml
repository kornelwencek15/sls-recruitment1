apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-test
  namespace: devops-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-test
  template:
    metadata:
      labels:
        app: devops-test
    spec:
      serviceAccountName: devops-test
      containers:
        - name: app
          image: ${IMAGE}
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://127.0.0.1:5432/devops_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "${GCP_APP_SA_IAM_USER}"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

        # Authenticates to Cloud SQL via Workload Identity and proxies connections
        # to 127.0.0.1:5432. The app connects as if Postgres were running locally.
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          args:
            - "--auto-iam-authn"
            - "--structured-logs"
            - "--port=5432"
            - "${CLOUD_SQL_CONNECTION_NAME}"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            runAsNonRoot: true
